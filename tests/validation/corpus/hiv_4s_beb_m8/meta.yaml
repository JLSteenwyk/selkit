source: PAML 4.10.10 examples/HIVNSsites/HIVenvSweden4s; rerun with NSsites=8 and BEB enabled
description: |
  M8 BEB posteriors on the 4-taxon HIV env V3 subset. Uses the same alignment
  and tree as hiv_4s/ but fits M8 (which hiv_4s omits because its lnL-only
  test wasn't meaningful at the β boundary — here we need a full M8 fit).
genetic_code: standard
models: [M8]
tests: []
beb_grid: 10
# At grid_size=10 the selkit/PAML per-site p_positive agreement on this
# 4-taxon HIV case is bounded at ~0.10 (max 0.099, mean 0.068, p95 0.087
# across all 91 sites). Selkit's posteriors run slightly flatter than PAML's
# — consistent with coarse-grid integration. Tighter agreement (<0.02)
# needs grid_size=20+, which costs ~16x more per BEB fit.
beb_tolerance: 0.10
seed: 0
n_starts: 5
paml_cmd: codeml codeml_m8.ctl  # NSsites=8, CodonFreq=2 (F3X4), cleandata=1
# BEB posterior comparison runs in tests/validation/test_beb_m8_paml_match.py
# (uses meta's `beb_tolerance`, default 0.01). Skip the generic
# test_paml_corpus runner because its BEB_TOL=1e-3 is tighter than the
# grid-integration can reach at default grid_size=10.
blocked: generic runner skipped; dedicated BEB test in test_beb_m8_paml_match.py
