source: PAML 4.10.10 examples/lysozyme/lysozymeLarge; NSsites=2 model=2, BEB enabled
description: |
  Model A BEB per-site posteriors on the 19-taxon primate lysozyme alignment
  with the canonical colobine foreground. Reuses the alignment+tree from
  lysozyme_branchsite/; here we lock in BEB (p_class_2a, p_class_2b, p_positive).
genetic_code: standard
models: [ModelA]
tests: []
beb_grid: 10
# At grid_size=10 the selkit/PAML per-site p_positive agreement on this
# 19-taxon lysozyme case is bounded at ~0.08 (max 0.073, mean 0.058, p95
# 0.068 across all 130 sites). Selkit's posteriors run slightly flatter
# than PAML's — consistent with coarse-grid integration. Tighter agreement
# (<0.02) needs grid_size=20+, which costs ~16x more per BEB fit.
beb_tolerance: 0.10
foreground:
  mrca: [5.colobus_Cgu&Can, 6.langur_Sen&Sve, 7.langur_Tob&Tfr, 8.Douc_langur_Pne, 9.probiscis_Nla]
seed: 0
n_starts: 3
paml_cmd: codeml codeml.ctl  # model=2 NSsites=2 CodonFreq=2 (F3X4) cleandata=1; BEB block in rst
# BEB posterior comparison runs in tests/validation/test_beb_modela_paml_match.py
# (uses meta's `beb_tolerance`, default 0.01). Skip the generic test_paml_corpus
# runner because its BEB_TOL=1e-3 is tighter than grid-integration can reach
# at default grid_size=10.
blocked: generic runner skipped; dedicated BEB test in test_beb_modela_paml_match.py
